<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>تصنيف المعاملة</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f5;
    --text-muted: #6b6b80;
    --accent: #4f8ef7;
    --green: #22c55e;
    --blue: #3b82f6;
    --purple: #a855f7;
    --dark: #64748b;
    --gold: #f59e0b;
    --red: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(79,142,247,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(168,85,247,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 40px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
    animation: fadeDown 0.4s ease;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(79,142,247,0.1);
    border: 1px solid rgba(79,142,247,0.2);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .pulse-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .transaction-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease 0.1s both;
  }

  .transaction-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0; left: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .tx-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .tx-amount {
    font-size: 42px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
    letter-spacing: -1px;
  }

  .tx-amount .currency {
    font-size: 20px;
    font-weight: 400;
    color: var(--text-muted);
    margin-right: 4px;
  }

  .tx-meta {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .tx-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
  }

  .tx-tag.incoming { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .tx-tag.outgoing { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.15); }
  .tx-tag.bank { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border); }

  .section {
    margin-bottom: 20px;
    animation: fadeUp 0.4s ease both;
  }

  .section-title {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    padding-right: 4px;
  }

  .btn-grid { display: grid; gap: 10px; }
  .btn-grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .btn-grid.cols-1 { grid-template-columns: 1fr; }

  .cat-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    text-align: right;
    width: 100%;
    -webkit-user-select: none;
    user-select: none;
  }

  .cat-btn:active { transform: scale(0.97); }

  .btn-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .btn-text { flex: 1; }
  .btn-name { font-size: 14px; font-weight: 600; display: block; }
  .btn-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; display: block; }

  .btn-green .btn-icon { background: rgba(34,197,94,0.12); }
  .btn-blue .btn-icon { background: rgba(59,130,246,0.12); }
  .btn-purple .btn-icon { background: rgba(168,85,247,0.12); }
  .btn-dark .btn-icon { background: rgba(100,116,139,0.12); }
  .btn-gold .btn-icon { background: rgba(245,158,11,0.12); }

  .btn-green:hover, .btn-green.selected { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.08); }
  .btn-blue:hover, .btn-blue.selected { border-color: rgba(59,130,246,0.4); background: rgba(59,130,246,0.08); }
  .btn-purple:hover, .btn-purple.selected { border-color: rgba(168,85,247,0.4); background: rgba(168,85,247,0.08); }
  .btn-dark:hover, .btn-dark.selected { border-color: rgba(100,116,139,0.4); background: rgba(100,116,139,0.08); }
  .btn-gold:hover, .btn-gold.selected { border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.08); }

  .sub-menu {
    display: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    margin-top: 10px;
    animation: fadeUp 0.25s ease;
  }

  .sub-menu.visible { display: block; }

  .sub-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    text-align: right;
    transition: all 0.15s ease;
    margin-bottom: 4px;
    -webkit-user-select: none;
    user-select: none;
  }

  .sub-btn:last-child { margin-bottom: 0; }
  .sub-btn:hover, .sub-btn.selected { background: rgba(255,255,255,0.05); border-color: var(--border); }
  .sub-btn .sub-icon { font-size: 16px; width: 24px; text-align: center; }

  .cash-input-wrap {
    display: none;
    margin-top: 10px;
    animation: fadeUp 0.25s ease;
  }

  .cash-input-wrap.visible { display: block; }

  .cash-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    direction: rtl;
  }

  .cash-input:focus { border-color: rgba(245,158,11,0.4); }
  .cash-input::placeholder { color: var(--text-muted); }

  .confirm-section {
    margin-top: auto;
    padding-top: 20px;
    animation: fadeUp 0.4s ease 0.5s both;
  }

  .confirm-btn {
    width: 100%;
    background: linear-gradient(135deg, #4f8ef7, #7c3aed);
    border: none;
    border-radius: 16px;
    padding: 18px;
    color: white;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  .confirm-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .confirm-btn:not(:disabled):active { transform: scale(0.98); }

  .success-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }

  .success-screen.show { display: flex; }

  .success-icon {
    width: 80px; height: 80px;
    background: rgba(34,197,94,0.1);
    border: 2px solid rgba(34,197,94,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin-bottom: 24px;
    animation: scaleIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes scaleIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .success-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .success-sub { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.85);
    z-index: 99;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .loading-overlay.show { display: flex; }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-badge">
      <div class="pulse-dot"></div>
      <span id="headerText">معاملة جديدة تحتاج تصنيف</span>
    </div>
  </div>

  <!-- بطاقة المعاملة -->
  <div class="transaction-card">
    <div class="tx-label">المبلغ</div>
    <div class="tx-amount">
      <span class="currency">SAR</span><span id="amountVal">---</span>
    </div>
    <div class="tx-meta">
      <span class="tx-tag" id="txDirection">---</span>
      <span class="tx-tag bank" id="txBank">---</span>
      <span class="tx-tag bank" id="txType">---</span>
    </div>
  </div>

  <!-- قسم الإيرادات -->
  <div id="incomingSection" class="section" style="display:none;">
    <div class="section-title">هذا الإيراد من؟</div>
    <div class="btn-grid cols-1">
      <button class="cat-btn btn-green" onclick="selectFinal(this,'راتب','الرئيسي','✅ مكتمل')">
        <div class="btn-icon">💼</div>
        <div class="btn-text">
          <span class="btn-name">راتب</span>
          <span class="btn-desc">الراتب الشهري من الشركة</span>
        </div>
      </button>
      <button class="cat-btn btn-blue" onclick="selectFinal(this,'عهدة','الرئيسي','🔴 فاتورة مفقودة')">
        <div class="btn-icon">🏢</div>
        <div class="btn-text">
          <span class="btn-name">عهدة</span>
          <span class="btn-desc">مبالغ عمل من الشركة</span>
        </div>
      </button>
      <button class="cat-btn btn-purple" onclick="selectFinal(this,'هديل','زوجتي','—')">
        <div class="btn-icon">🌸</div>
        <div class="btn-text">
          <span class="btn-name">هديل</span>
          <span class="btn-desc">إيراد خاص بهديل</span>
        </div>
      </button>
    </div>
  </div>

  <!-- قسم المصروفات -->
  <div id="outgoingSection" class="section" style="display:none;">
    <div class="section-title">هذا المصروف لـ؟</div>
    <div class="btn-grid cols-2">

      <button class="cat-btn btn-blue" onclick="selectFinal(this,'SAB السائق','SAB_السائق','🔴 فاتورة مفقودة')">
        <div class="btn-icon">🚗</div>
        <div class="btn-text">
          <span class="btn-name">SAB السائق</span>
          <span class="btn-desc">مصروف عمل</span>
        </div>
      </button>

      <button class="cat-btn btn-purple" id="btnHadeel" onclick="toggleSub('hadeelSub',this)">
        <div class="btn-icon">🌸</div>
        <div class="btn-text">
          <span class="btn-name">هديل</span>
          <span class="btn-desc">تحويل أو شراء ←</span>
        </div>
      </button>

      <button class="cat-btn btn-dark" id="btnPersonal" onclick="toggleSub('personalSub',this)" style="grid-column: span 2;">
        <div class="btn-icon">👤</div>
        <div class="btn-text">
          <span class="btn-name">شخصي</span>
          <span class="btn-desc">اختر النوع ←</span>
        </div>
      </button>

      <button class="cat-btn btn-gold" id="btnCash" onclick="toggleSub('cashSub',this)" style="grid-column: span 2;">
        <div class="btn-icon">💵</div>
        <div class="btn-text">
          <span class="btn-name">كاش</span>
          <span class="btn-desc">تحويل مقابل استلام كاش</span>
        </div>
      </button>

    </div>

    <!-- هديل الفرعية -->
    <div class="sub-menu" id="hadeelSub">
      <button class="sub-btn" onclick="selectFinal(this,'تحويل لهديل','زوجتي','—')">
        <span class="sub-icon">💸</span> تحويل مباشر
      </button>
      <button class="sub-btn" onclick="selectFinal(this,'شراء لهديل','زوجتي','—')">
        <span class="sub-icon">🛍️</span> شراء لصالحها
      </button>
    </div>

    <!-- شخصي الفرعية -->
    <div class="sub-menu" id="personalSub">
      <button class="sub-btn" onclick="selectFinal(this,'وقود وسيارة','شخصي','—')">
        <span class="sub-icon">⛽</span> وقود وسيارة
      </button>
      <button class="sub-btn" onclick="selectFinal(this,'طعام','شخصي','—')">
        <span class="sub-icon">🍽️</span> طعام
      </button>
      <button class="sub-btn" onclick="selectFinal(this,'إيجار','شخصي','—')">
        <span class="sub-icon">🏠</span> إيجار
      </button>
      <button class="sub-btn" onclick="selectFinal(this,'كهرباء','شخصي','—')">
        <span class="sub-icon">⚡</span> كهرباء
      </button>
      <button class="sub-btn" onclick="selectFinal(this,'مصروفات المنزل','شخصي','—')">
        <span class="sub-icon">🏡</span> مصروفات المنزل
      </button>
      <button class="sub-btn" onclick="selectFinal(this,'سكن مشترك','شخصي','—')">
        <span class="sub-icon">🏘️</span> سكن مشترك
      </button>
      <button class="sub-btn" onclick="selectFinal(this,'تحويل للأهل','شخصي','—')">
        <span class="sub-icon">👨‍👩‍👧</span> تحويل للأهل
      </button>
      <button class="sub-btn" onclick="selectFinal(this,'أخرى','شخصي','—')">
        <span class="sub-icon">📌</span> أخرى
      </button>
    </div>

    <!-- كاش -->
    <div class="cash-input-wrap" id="cashSub">
      <input type="text" class="cash-input" id="cashReason"
        placeholder="اكتب سبب الكاش..."
        oninput="checkCashInput()">
    </div>

  </div>

  <div class="confirm-section">
    <button class="confirm-btn" id="confirmBtn" disabled onclick="submitData()">
      اختر تصنيفاً أولاً
    </button>
  </div>

</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<div class="success-screen" id="successScreen">
  <div class="success-icon">✓</div>
  <div class="success-title">تم التسجيل ✅</div>
  <div class="success-sub" id="successMsg"></div>
</div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwEUy2lH16wDemFMxJ7WSzN9sA2gfsT9UnUjNVRZCV67M1RsYtA0abMD4GQCmacomXN/exec";

// ============================================================
// قراءة المعاملة
// ============================================================
const params    = new URLSearchParams(window.location.search);
const amount    = params.get('amount')    || '0';
const bank      = params.get('bank')      || '---';
const type      = params.get('type')      || '---';
const direction = params.get('direction') || '---';

document.getElementById('amountVal').textContent =
  parseFloat(amount).toLocaleString('ar-SA') || amount;
document.getElementById('txBank').textContent = bank;
document.getElementById('txType').textContent = type;

const dirEl = document.getElementById('txDirection');
if (direction === 'وارد') {
  dirEl.textContent = '↓ وارد';
  dirEl.className = 'tx-tag incoming';
  document.getElementById('incomingSection').style.display = 'block';
} else {
  dirEl.textContent = '↑ صادر';
  dirEl.className = 'tx-tag outgoing';
  document.getElementById('outgoingSection').style.display = 'block';
}

// ============================================================
// منطق الأزرار
// ============================================================
let sel = { category: null, sheet: null, status: null };

function clearAll() {
  document.querySelectorAll('.cat-btn, .sub-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.sub-menu, .cash-input-wrap').forEach(m => m.classList.remove('visible'));
  sel = { category: null, sheet: null, status: null };
}

function selectFinal(btn, category, sheet, status) {
  clearAll();
  btn.classList.add('selected');
  sel = { category, sheet, status };
  updateConfirm();
}

function toggleSub(subId, btn) {
  const sub = document.getElementById(subId);
  const wasOpen = sub.classList.contains('visible');
  clearAll();
  if (!wasOpen) {
    sub.classList.add('visible');
    btn.classList.add('selected');
  }
  updateConfirm();
}

function checkCashInput() {
  const val = document.getElementById('cashReason').value.trim();
  if (val) {
    sel = { category: 'كاش — ' + val, sheet: 'كاش', status: '—', reason: val };
  } else {
    sel = { category: null, sheet: null, status: null };
  }
  updateConfirm();
}

function updateConfirm() {
  const btn = document.getElementById('confirmBtn');
  if (sel.category) {
    btn.disabled = false;
    btn.textContent = '✓ تأكيد: ' + sel.category;
  } else {
    btn.disabled = true;
    btn.textContent = 'اختر تصنيفاً أولاً';
  }
}

// ============================================================
// بناء الـ payload حسب الورقة
// ============================================================
function buildPayload() {
  const { category, sheet, status } = sel;
  switch(sheet) {
    case 'الرئيسي':
      return { sheet, type, bank, amount, direction, category, note: '', status };
    case 'SAB_السائق':
      return { sheet, type, amount, direction, purpose: '', status: '🔴 فاتورة مفقودة' };
    case 'زوجتي':
      return { sheet, type: category, amount, direction, note: bank };
    case 'شخصي':
      return { sheet, category, amount, bank, note: '' };
    case 'كاش':
      return { sheet, amount, recipient: '', reason: sel.reason || '', bank };
    default:
      return { sheet, amount, category, bank, direction };
  }
}

// ============================================================
// إرسال
// ============================================================
async function submitData() {
  if (!sel.category) return;
  document.getElementById('loadingOverlay').classList.add('show');
  try {
    await fetch(WEBAPP_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(buildPayload())
    });
    document.getElementById('loadingOverlay').classList.remove('show');
    document.getElementById('successMsg').textContent =
      `${parseFloat(amount).toLocaleString('ar-SA')} ريال — ${sel.category} — ${bank}`;
    document.getElementById('successScreen').classList.add('show');
    setTimeout(() => { try { TaskerPlugin.finish(); } catch(e) { window.close(); } }, 2000);
  } catch(err) {
    document.getElementById('loadingOverlay').classList.remove('show');
    alert('تحقق من الاتصال وحاول مجدداً');
  }
}
</script>
</body>
</html>
